<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="/styles/main.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    
    <section class="calculator">
        <div class="display">
            <p class="expression-text"></p>
            <p class="result-text">0</p>
        </div>
        <div class="buttons">
            <button class="function-btn" id="erase"><i class="bi bi-backspace"></i></button>
            <button class="function-btn" id="AC">AC</button>
            <button class="action-btn" id="divide">÷</button>
            <button class="number-btn" id="seven">7</button>
            <button class="number-btn" id="eight">8</button>
            <button class="number-btn" id="nine">9</button>
            <button class="action-btn" id="multiply">×</button>
            <button class="number-btn" id="four">4</button>
            <button class="number-btn" id="five">5</button>
            <button class="number-btn" id="six">6</button>
            <button class="action-btn" id="minus">-</button>
            <button class="number-btn" id="one">1</button>
            <button class="number-btn" id="two">2</button>
            <button class="number-btn" id="three">3</button>
            <button class="action-btn" id="plus">+</button>
            <button class="number-btn" id="zero">0</button>
            <button class="number-btn" id="point">.</button>
            <button id="equal">=</button>
        </div>
    </section>

    <script src="/script.js"></script>
</body>
</html>
